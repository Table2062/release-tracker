<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <link rel="stylesheet" href="./styles.css">
  <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>

<div class="layout">
  <div class="left-panel">
    <div class="top-controls">
      <button id="loadJsonBtn">Load JSON</button>
      <input type="file" id="jsonFileInput" accept=".json" style="display:none;">

      <div class="date-controls-wrapper">
        <div class="date-group">
          <label>From</label>
          <input type="date" id="startDate">
        </div>
        <div class="date-group">
          <label>To &nbsp;&nbsp;&nbsp;</label>
          <input type="date" id="endDate">
        </div>
        <button id="resetDatesBtn" title="Reset dates">&#8634;</button>
      </div>
    </div>
    <div id="legend"></div>
  </div>

  <div class="chart-container">
    <div class="chart-wrapper">
      <div id="branch-labels-sticky"></div>
      <svg id="chart"></svg>
    </div>
  </div>
</div>

<div class="release-table-container">
  <table id="releaseTable"></table>
</div>

<div id="tooltip" class="tooltip"></div>
<div id="pinnedTooltip" class="pinned-tooltip hidden"></div>

<script src="./script.js"></script>
</body>
</html>
